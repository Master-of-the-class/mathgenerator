<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;

      display: flex;
      flex-direction: column;
      align-items: flex-start; /* LEFT ALIGN */
      justify-content: flex-start; /* TOP ALIGN */
      padding: 20px;
    }

   .problem {
  font-size: clamp(40px, 8vw, 90px);
  font-weight: bold;
  margin: 10px 0;
}

.answer {
  font-size: clamp(30px, 6vw, 70px);
  color: green;
  display: none;
  margin: 5px 0 20px 0;
}

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      margin: 5px 10px 5px 0;

      width: auto;
      max-width: 200px;
    }

    button:hover {
      background-color: #7F00FF;
    }
  </style>
</head>

<body>

  <div class="problem" id="addition"></div>
  <div class="answer" id="additionAnswer"></div>

  <div class="problem" id="subtraction"></div>
  <div class="answer" id="subtractionAnswer"></div>

  <button onclick="generateProblems()">Nouveaux calculs</button>
  <button onclick="showAnswers()">Afficher réponses</button>

  <script>
    let addResult = 0;
    let subResult = 0;

    function random4Digit() {
      return Math.floor(Math.random() * 9000) + 1000;
    }

    function generateProblems() {
      let a = random4Digit();
      let b = random4Digit();

      let c = random4Digit();
      let d = random4Digit();

      if (c < d) {
        [c, d] = [d, c];
      }

      addResult = a + b;
      subResult = c - d;

      document.getElementById("addition").textContent = `${a} + ${b} = ?`;
      document.getElementById("subtraction").textContent = `${c} - ${d} = ?`;

      document.getElementById("additionAnswer").textContent = `Réponse : ${addResult}`;
      document.getElementById("subtractionAnswer").textContent = `Réponse : ${subResult}`;

      document.getElementById("additionAnswer").style.display = "none";
      document.getElementById("subtractionAnswer").style.display = "none";
    }

    function showAnswers() {
      document.getElementById("additionAnswer").style.display = "block";
      document.getElementById("subtractionAnswer").style.display = "block";
    }

    generateProblems();
  </script>

</body>
</html>
